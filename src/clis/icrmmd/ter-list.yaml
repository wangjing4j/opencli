# iCRM MD UAT — baseAccount TER list (browser context + x-access-token).
# Prerequisites: Browser Bridge connected; automation window logged into UAT web so
# localStorage has pro__Access-Token = {"value":"<JWT>","expire":<ms>}. Override key via --tokenStorageKey;
# override JWT via --accessToken (raw token, not the JSON wrapper).
# fetch() still uses credentials: "include" for any shared cookies.
site: icrmmd
name: ter-list
description: List TER accounts (ipro-biz-core baseAccount/web/ter/list, UAT; x-access-token from localStorage or --accessToken)
domain: icrmmd-web-uat.imstech.com.cn
strategy: cookie
browser: true

args:
  accessToken:
    description: Optional x-access-token; when set, skips localStorage (use if key differs or for quick tests)
  tokenStorageKey:
    default: pro__Access-Token
    description: localStorage key; value is JSON with .value (JWT) and optional .expire (epoch ms)
  tenantId:
    default: 846561c506b063d9b1695cd8bfae2fb7
    description: Header tenant-id
  pageNo:
    type: int
    default: 1
    description: Page number
  pageSize:
    type: int
    default: 10
    description: Page size

pipeline:
  - evaluate: |
      (async () => {
        const key = "${{ args.tokenStorageKey }}";
        let override = ${{ args.accessToken | json }};
        if (override !== null && override !== undefined && String(override).length > 0) {
          return { accessToken: String(override) };
        }
        const raw = localStorage.getItem(key);
        if (!raw) throw new Error('[icrmmd ter-list] localStorage.' + key + ' is empty — log in on UAT in this automation window, or pass --accessToken.');
        let parsed = null;
        let jwt = '';
        try {
          parsed = JSON.parse(raw);
          if (parsed && typeof parsed.value === 'string') jwt = parsed.value;
        } catch (e) { /* treat as plain JWT string */ }
        if (!jwt) jwt = String(raw).trim();
        if (!jwt) throw new Error('[icrmmd ter-list] No JWT in localStorage.' + key + ' (expected JSON with .value).');
        if (parsed && typeof parsed.expire === 'number' && parsed.expire < Date.now()) {
          throw new Error('[icrmmd ter-list] localStorage token expired (expire < now). Log in again.');
        }
        return { accessToken: jwt };
      })()
  - fetch:
      url: https://icrmmd-gateway-uat.imstech.com.cn/ipro-biz-core/baseAccount/web/ter/list
      method: GET
      params:
        column: createTime
        order: desc
        field: id,,,id,accCode,accName,accGender,accType,toAccName,toAccCode,accDepart,accSpecialty,accJobTitle,accTitle,customField6,customField7,customField8,customField9,customField11,customField12,customField40,customField5
        pageNo: ${{ args.pageNo }}
        pageSize: ${{ args.pageSize }}
      headers:
        accept: application/json, text/plain, */*
        accept-language: en-US,en;q=0.9,zh-CN;q=0.8,zh;q=0.7
        cache-control: no-cache
        pragma: no-cache
        origin: https://icrmmd-web-uat.imstech.com.cn
        referer: https://icrmmd-web-uat.imstech.com.cn/
        tenant-id: ${{ args.tenantId }}
        x-access-token: ${{ data.accessToken }}
  - evaluate: |
      (async () => {
        const payload = ${{ data | json }} || {};
        if (Array.isArray(payload)) return payload;
        if (Array.isArray(payload.result)) return payload.result;
        if (Array.isArray(payload.data)) return payload.data;
        if (payload.result && Array.isArray(payload.result.records)) return payload.result.records;
        if (payload.result && Array.isArray(payload.result.list)) return payload.result.list;
        if (payload.data && Array.isArray(payload.data.records)) return payload.data.records;
        if (payload.data && Array.isArray(payload.data.list)) return payload.data.list;
        return [];
      })()
  - map:
      id: ${{ item.id }}
      accCode: ${{ item.accCode }}
      accName: ${{ item.accName }}
      accGender: ${{ item.accGender }}
      accType: ${{ item.accType }}
      toAccName: ${{ item.toAccName }}
      toAccCode: ${{ item.toAccCode }}
      accDepart: ${{ item.accDepart }}
      accSpecialty: ${{ item.accSpecialty }}
      accJobTitle: ${{ item.accJobTitle }}
      accTitle: ${{ item.accTitle }}
      customField6: ${{ item.customField6 }}
      customField7: ${{ item.customField7 }}
      customField8: ${{ item.customField8 }}
      customField9: ${{ item.customField9 }}
      customField11: ${{ item.customField11 }}
      customField12: ${{ item.customField12 }}
      customField40: ${{ item.customField40 }}
      customField5: ${{ item.customField5 }}

columns: [id, accCode, accName, accGender, accType, toAccName, toAccCode, accDepart, accSpecialty, accJobTitle, accTitle, customField6, customField7, customField8, customField9, customField11, customField12, customField40, customField5]
